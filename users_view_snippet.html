<!-- VIEW: USERS (Admin) -->
<section id="view-users" class="view-section h-full flex flex-col hidden overflow-hidden">
    <div
        class="bg-white dark:bg-slate-800 p-4 border-b border-slate-200 dark:border-slate-700 flex flex-col md:flex-row gap-4 justify-between items-start md:items-center">
        <div>
            <h2 class="text-2xl font-extrabold text-slate-900 dark:text-white tracking-tight">Gestión de Usuarios</h2>
            <p class="text-sm text-slate-500 dark:text-slate-400">Crea y administra cuentas de usuarios.</p>
        </div>
        <button id="add-user-btn"
            class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-medium shadow-sm transition-all flex items-center gap-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
            </svg>
            Nuevo Usuario
        </button>
    </div>
    <div class="flex-1 overflow-auto bg-slate-50 dark:bg-slate-900 p-4">
        <div
            class="bg-white dark:bg-slate-800 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700 overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead class="bg-slate-50 dark:bg-slate-700/50 sticky top-0 z-10">
                    <tr>
                        <th
                            class="p-3 text-xs font-semibold text-slate-600 dark:text-slate-300 uppercase tracking-wider">
                            Email</th>
                        <th
                            class="p-3 text-xs font-semibold text-slate-600 dark:text-slate-300 uppercase tracking-wider">
                            Rol</th>
                        <th
                            class="p-3 text-xs font-semibold text-slate-600 dark:text-slate-300 uppercase tracking-wider">
                            Moneda</th>
                        <th
                            class="p-3 text-xs font-semibold text-slate-600 dark:text-slate-300 uppercase tracking-wider text-right">
                            Acciones</th>
                    </tr>
                </thead>
                <tbody id="users-table-body" class="divide-y divide-slate-100 dark:divide-slate-700">
                    <!-- Users will be injected here -->
                </tbody>
            </table>
        </div>
    </div>
</section>

<!-- USER MODAL -->
<div id="user-modal" style="display: none;"
    class="fixed inset-0 z-50 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center p-4 hidden">
    <div
        class="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl w-full max-w-md overflow-hidden transform transition-all select-none">
        <div
            class="p-4 border-b border-slate-100 dark:border-slate-700 flex justify-between items-center bg-slate-50 dark:bg-slate-800/50">
            <h3 class="font-bold text-lg text-slate-800 dark:text-white">Nuevo Usuario</h3>
            <button id="close-user-modal"
                class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12">
                    </path>
                </svg>
            </button>
        </div>
        <form id="user-form" class="flex flex-col">
            <div class="p-6 space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Email</label>
                    <input type="email" id="user-email" required
                        class="w-full rounded-lg border-slate-300 dark:border-slate-600 dark:bg-slate-700 dark:text-white focus:ring-blue-500 focus:border-blue-500 transition-shadow shadow-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Contraseña</label>
                    <input type="password" id="user-password" required
                        class="w-full rounded-lg border-slate-300 dark:border-slate-600 dark:bg-slate-700 dark:text-white focus:ring-blue-500 focus:border-blue-500 transition-shadow shadow-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Rol</label>
                    <select id="user-role"
                        class="w-full rounded-lg border-slate-300 dark:border-slate-600 dark:bg-slate-700 dark:text-white focus:ring-blue-500 focus:border-blue-500 shadow-sm">
                        <option value="user">Usuario (Cajero)</option>
                        <option value="admin">Administrador</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Moneda
                        Principal</label>
                    <select id="user-currency"
                        class="w-full rounded-lg border-slate-300 dark:border-slate-600 dark:bg-slate-700 dark:text-white focus:ring-blue-500 focus:border-blue-500 shadow-sm">
                        <option value="USD">Dólar (USD)</option>
                        <option value="BS">Bolívar (Bs)</option>
                    </select>
                </div>
            </div>
            <div
                class="p-4 border-t border-slate-100 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50 flex justify-end gap-3">
                <button type="button" id="cancel-user-modal"
                    class="px-4 py-2 text-slate-700 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-700 rounded-lg font-medium transition-colors">Cancelar</button>
                <button type="submit"
                    class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-medium shadow-md transition-all transform active:scale-95">Guardar
                    Usuario</button>
            </div>
        </form>
    </div>
</div>
