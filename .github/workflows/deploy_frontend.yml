name: Deploy to Cloudflare Pages

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    name: Deploy to Cloudflare Pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create config.js
        run: |
          echo "export const firebaseConfig = {" > js/config.js
          echo "    apiKey: \"${{ secrets.FIREBASE_API_KEY }}\"," >> js/config.js
          echo "    authDomain: \"american-pos.firebaseapp.com\"," >> js/config.js
          echo "    projectId: \"american-pos\"," >> js/config.js
          echo "    storageBucket: \"american-pos.firebasestorage.app\"," >> js/config.js
          echo "    messagingSenderId: \"248248095933\"," >> js/config.js
          echo "    appId: \"1:248248095933:web:b0f75f9e5dfbc4594e93d4\"" >> js/config.js
          echo "};" >> js/config.js
          echo "" >> js/config.js
          echo "// API Configuration" >> js/config.js
          echo "const isLocal = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' || window.location.hostname.startsWith('192.168.');" >> js/config.js
          echo "export const API_BASE_URL = isLocal ? \`http://\${window.location.hostname}:3000\` : 'https://american-pos-backend.pages.dev';" >> js/config.js
          echo "Verifying config.js was created:"
          cat js/config.js

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy . --project-name=american-pos
